<!DOCTYPE html>
<html lang="en">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="public/img/favicon.ico" />

  <link rel="stylesheet" href="css/style.css">
  <title>INGSOT</title>
</head>

<body>

  <div class="wrapper">

    <section class="main_banner dn" id="main_banner">
      <div class="bcg_anim">

  </div>

    window.addEventListener('pagehide', () => bg.destroy());
