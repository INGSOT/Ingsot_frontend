<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="public/img/favicon.ico" />

  <link rel="stylesheet" href="css/style.css">
  <title>INGSOT</title>
</head>

<body>

  <div class="wrapper">

    <div class="modal" id="modal"></div>

    <div id="header_placeholder"></div>

    <section class="prices bb_white">
      <div class="anim_fond">
        <div class="blur_layer">
          <div class="ball v1"></div>
          <div class="ball v2"></div>
        </div>
      </div>

      <div class="left">
        <div class="info">
          <a href="02.1.services.html" class="btn_decor_white">
            <span class="bcg">
              <img src="public/img/svg/shevron_black_left.svg" alt="">
            </span>
            <span>Клієнти</span>
          </a>
          <div class="pict">
            <img src="public/img/projects_slider3.webp" alt="">
          </div>
        </div>
      </div>

      <div class="right">
        <div class="cont">
          <div class="title">
            <div class="brand">
              <img src="public/img/svg/websites/sixt_white.svg" alt="">
            </div>
          </div>
          <div class="title">
            <p>Сервіс оренди авто</p>
          </div>
          <div class="tags near_black">
            <a href="">#контроль температури</a>
            <a href="">#тег</a>
            <a href="">#контроль температури</a>
            <a href="">#довгийтег</a>
          </div>
          <div class="offers">
            <div class="item w33">
              <p>Оренда та лізинг авто по Україні та світу</p>
            </div>
            <div class="item w33">
              <h3>115+</h3>
              <p>країн</p>
            </div>
            <div class="item w33">
              <h3>4500+</h3>
              <p>пунктів прокату</p>
            </div>
          </div>
        </div>

        <div class="cont">
          <div class="title">
            <h3>Проєкти SIXT</h3>
          </div>
          <div class="title aic jcsb">
            <h4>Оновлений веб-додаток SIXT</h4>
            <a href="" target="_blank" class="round_btn">
              <svg width="8" height="12" viewBox="0 0 8 12" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M0 10.5859L4.58594 6.00296L8.01831e-07 1.41406L1.41406 0L7.41406 6.00296L1.41406 12L0 10.5859Z" />
              </svg>
            </a>
          </div>
          <div class="title aic jcsb">
            <h4>Рекламні кампанії SIXT</h4>
            <a href="" target="_blank" class="round_btn">
              <svg width="8" height="12" viewBox="0 0 8 12" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M0 10.5859L4.58594 6.00296L8.01831e-07 1.41406L1.41406 0L7.41406 6.00296L1.41406 12L0 10.5859Z" />
              </svg>
            </a>
          </div>
        </div>

        <div class="cont">
          <div class="title column">
            <h2>Почнемо співпрацю</h2>
            <p>Знайдемо ефективне рішення ваших задач.</p>
          </div>
          <div class="title">
            <button type="button" class="btn_decor_white"
              onclick="loadComponent('submit_request', '#modal'); openModal();">
              <span class="bcg">
                <img src="public/img/svg/shevron_black_right.svg" alt="">
              </span>
              <span>Залишити заявку</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <div id="coplexity_placeholder"></div>

    <div id="footer_placeholder"></div>

  </div>

  <script src="js/jquery_min_3.7.1.js"></script>
  <script src="js/slick.min.js"></script>

  <script src="js/flatpickr/flatpickr.js"></script>
  <script src="js/flatpickr/uk.js"></script>
  <script src="js/flatpickr/ru.js"></script>

  <script src="js/script.js" defer></script>

  <!-- Виклики компоненнтів -->
  <script src="js/loadComponent.js"></script>
  <script>
    loadComponent('header', '#header_placeholder');
    loadComponent('coplexity', '#coplexity_placeholder');
    loadComponent('footer', '#footer_placeholder');
  </script>

</body>

</html>
